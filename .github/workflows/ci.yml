name: CI Pipeline


on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Fix permissions
        run: chmod +x demo/mvnw

      - name: Build with Maven
        run: ./demo/mvnw clean package -DskipTests